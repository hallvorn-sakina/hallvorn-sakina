services:
  - type: web
    name: sakina
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      # Port Configuration (Critical for Render)
      - key: PORT
        value: 10000
      - key: GRADIO_SERVER_NAME
        value: "0.0.0.0"
      - key: GRADIO_SERVER_PORT
        value: 10000
      
      # Gradio Production Settings
      - key: GRADIO_SHARE
        value: "False"
      - key: GRADIO_ANALYTICS_ENABLED
        value: "False"
      - key: GRADIO_DEBUG
        value: "0"
      
      # Python Version (Alternative to .python-version file)
      - key: PYTHON_VERSION
        value: "3.12.8"
      
      # Your API Keys (Set these in Render Dashboard - don't commit real values)
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      
      # App Configuration
      - key: APP_URL
        value: "https://sakina.hallvorn.com"
    
    domains:
      - sakina.hallvorn.com
